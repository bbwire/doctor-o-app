<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT Debug - Doctor O</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.info { background: #d1ecf1; color: #0c5460; }
        .jwt-display { background: #f8f9fa; border: 1px solid #dee2e6; padding: 15px; border-radius: 5px; font-family: monospace; font-size: 12px; word-break: break-all; margin: 10px 0; max-height: 300px; overflow-y: auto; }
        .input-group { margin: 15px 0; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group input, .input-group textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .input-group textarea { height: 60px; resize: vertical; }
    </style>
</head>
<body>
    <div class="container">
        <h1>JWT Debug Tool - Doctor O</h1>
        <p>Debug your JWT token for JaaS authentication.</p>
        
        <div class="section">
            <h3>Configuration</h3>
            <div class="input-group">
                <label for="apiUrl">API Base URL:</label>
                <input type="text" id="apiUrl" value="https://dotoroapi.tangutechug.com/public/api/v1" />
            </div>
            <div class="input-group">
                <label for="authToken">Auth Token:</label>
                <textarea id="authToken">1|doctor-token-12345</textarea>
            </div>
            <div class="input-group">
                <label for="roomName">Room Name:</label>
                <input type="text" id="roomName" value="doctoro-test" />
            </div>
        </div>

        <div class="section">
            <h3>JWT Generation</h3>
            <button onclick="generateJWT()">Generate JWT</button>
            <button onclick="decodeJWT()" id="decodeBtn" disabled>Decode JWT</button>
        </div>

        <div id="status" class="status info">
            Ready to debug JWT token.
        </div>

        <div id="jwtResponse" style="display: none;">
            <h3>JWT Response:</h3>
            <div class="jwt-display" id="jwtContent"></div>
        </div>

        <div id="jwtDecoded" style="display: none;">
            <h3>Decoded JWT Payload:</h3>
            <div class="jwt-display" id="decodedContent"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsonwebtoken@9.0.0/dist/index.min.js"></script>
    <script>
        let currentJWT = null;

        function updateStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.className = `status ${type}`;
            statusEl.textContent = message;
        }

        async function generateJWT() {
            const apiUrl = document.getElementById('apiUrl').value;
            const authToken = document.getElementById('authToken').value;
            const roomName = document.getElementById('roomName').value;
            
            updateStatus('Generating JWT token...', 'info');
            
            try {
                const response = await fetch(`${apiUrl}/jitsi/generate-token`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        roomName: roomName,
                        isModerator: true,
                        consultationId: 'test-123'
                    })
                });

                const data = await response.json();
                
                if (response.ok && data.token) {
                    currentJWT = data.token;
                    document.getElementById('jwtContent').textContent = JSON.stringify(data, null, 2);
                    document.getElementById('jwtResponse').style.display = 'block';
                    document.getElementById('decodeBtn').disabled = false;
                    updateStatus(`✅ JWT generated! Domain: ${data.domain}`, 'success');
                } else {
                    updateStatus(`❌ JWT generation failed: ${data.message || data.error}`, 'error');
                }
                
            } catch (error) {
                updateStatus(`❌ Error: ${error.message}`, 'error');
            }
        }

        function decodeJWT() {
            if (!currentJWT) {
                updateStatus('No JWT to decode', 'error');
                return;
            }

            try {
                // Simple JWT decode (without verification)
                const parts = currentJWT.split('.');
                const payload = JSON.parse(atob(parts[1]));
                
                document.getElementById('decodedContent').textContent = JSON.stringify(payload, null, 2);
                document.getElementById('jwtDecoded').style.display = 'block';
                
                // Check for common issues
                const issues = [];
                if (!payload.iss) issues.push('Missing "iss" (issuer)');
                if (!payload.aud) issues.push('Missing "aud" (audience)');
                if (!payload.exp) issues.push('Missing "exp" (expiration)');
                if (!payload.sub) issues.push('Missing "sub" (subject)');
                if (!payload.context?.user?.moderator && payload.context?.user?.moderator !== false) issues.push('Missing "context.user.moderator"');
                if (!payload.room) issues.push('Missing "room"');
                
                if (issues.length > 0) {
                    updateStatus(`⚠️ JWT Issues: ${issues.join(', ')}`, 'info');
                } else {
                    updateStatus('✅ JWT structure looks correct!', 'success');
                }
                
            } catch (error) {
                updateStatus(`❌ Failed to decode JWT: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
